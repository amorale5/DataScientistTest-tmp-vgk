* { box-sizing: border-box; }
body { margin: 0; }
.viz-root {
  background: var(--page-plane);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  padding: 24px 16px 64px;
}
.wrap { max-width: 1180px; margin: 0 auto; }
h1 { font-size: 1.5rem; margin: 0 0 4px; }
.subtitle { color: var(--text-secondary); font-size: 0.92rem; margin: 0 0 24px; }
h2 { font-size: 1.15rem; margin: 40px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(430px, 1fr));
  gap: 16px;
}
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px 14px;
}
.card h3 { margin: 0 0 2px; font-size: 1rem; }
.card .unit { color: var(--text-muted); font-size: 0.8rem; margin: 0 0 12px; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px 10px;
  margin-bottom: 10px;
}
.stat {
  background: var(--page-plane);
  border-radius: 6px;
  padding: 6px 8px;
}
.stat .lbl { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .02em; }
.stat .val { font-size: 0.92rem; font-variant-numeric: tabular-nums; font-weight: 600; }
.stat .val.warn { color: var(--bad); }
.note-row {
  font-size: 0.78rem;
  color: var(--text-secondary);
  background: var(--page-plane);
  border-radius: 6px;
  padding: 7px 9px;
  margin-bottom: 8px;
  line-height: 1.4;
}
.note-row b { color: var(--text-primary); }
.note-row.crit { border-left: 3px solid var(--bad); }
.note-row.extra { border-left: 3px solid var(--warn); }
.note-row.dist { border-left: 3px solid var(--series-1); }
.chart-box { position: relative; margin-top: 8px; }
svg.hist { width: 100%; height: 150px; display: block; overflow: visible; }
.bar { fill: var(--series-1); }
.bar:hover { fill: var(--series-1); opacity: 0.75; }
.axis-line { stroke: var(--baseline); stroke-width: 1; }
.grid-line { stroke: var(--gridline); stroke-width: 1; }
.axis-label { fill: var(--text-muted); font-size: 9.5px; font-family: system-ui, sans-serif; }
.tooltip {
  position: fixed;
  pointer-events: none;
  background: var(--text-primary);
  color: var(--surface-1);
  font-size: 0.72rem;
  padding: 5px 8px;
  border-radius: 5px;
  transform: translate(-50%, -100%);
  white-space: nowrap;
  z-index: 50;
  opacity: 0;
  transition: opacity 0.08s;
}
.tooltip.show { opacity: 1; }

.catbar-row { display: grid; grid-template-columns: 130px 1fr 68px; align-items: center; gap: 8px; margin: 5px 0; }
.catbar-label { font-size: 0.82rem; color: var(--text-secondary); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.catbar-track { background: var(--page-plane); border-radius: 4px; height: 16px; position: relative; }
.catbar-fill { background: var(--series-1); height: 100%; border-radius: 4px; }
.catbar-val { font-size: 0.78rem; font-variant-numeric: tabular-nums; color: var(--text-secondary); }

.footer-note { color: var(--text-muted); font-size: 0.76rem; margin-top: 28px; line-height: 1.5; }

}
</script>

<script>
const DATA = JSON.parse(document.getElementById('report-data').textContent);
const tooltip = document.getElementById('tooltip');

const LABELS = {
  edad: ["Edad", "años"],
  ingreso_declarado: ["Ingreso declarado", "CLP / mes"],
  antiguedad_laboral_meses: ["Antigüedad laboral", "meses"],
  antiguedad_cliente_meses: ["Antigüedad como cliente", "meses"],
  score_buro: ["Score de buró", "300–850"],
  deuda_sistema: ["Deuda en el sistema financiero", "CLP"],
  uso_linea_credito_pct: ["Uso de línea de crédito", "%"],
  monto_solicitado: ["Monto solicitado", "CLP"],
  tasa_interes_anual: ["Tasa de interés anual", "%"],
};

const CAT_LABELS = {
  tipo_empleo: "Tipo de empleo",
  region: "Región",
  canal: "Canal de originación",
  dia_semana_solicitud: "Día de semana de la solicitud",
  num_creditos_vigentes: "N° créditos vigentes",
  peor_morosidad_12m: "Peor morosidad 12m previos",
  num_consultas_buro_3m: "Consultas al buró (3m)",
  num_contactos_ult_trimestre: "Contactos último trimestre",
  plazo_meses: "Plazo",
  default_12m: "Default 12m (target)",
};

const CAT_UNITS = {
  num_creditos_vigentes: "conteo (0–10)",
  peor_morosidad_12m: "días",
  num_consultas_buro_3m: "conteo (0–10)",
  num_contactos_ult_trimestre: "conteo (0–12)",
  plazo_meses: "meses",
  default_12m: "0 = no default, 1 = default",
};

function fmt(n, decimals) {
  if (n === null || n === undefined || Number.isNaN(n)) return "—";
  return Number(n).toLocaleString('es-CL', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtInt(n) { return Number(n).toLocaleString('es-CL'); }
function fmtP(p) {
  if (p === null || p === undefined) return "—";
  return p < 0.001 ? p.toExponential(2) : p.toFixed(3);
}

function renderHistogram(svg, counts, edges) {
  const W = 600, H = 150, padL = 34, padR = 8, padT = 8, padB = 20;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const maxCount = Math.max(...counts, 1);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('class', 'hist');
  let html = '';

  // gridlines (4 horizontal)
  const nGrid = 4;
  for (let i = 0; i <= nGrid; i++) {
    const y = padT + plotH - (i / nGrid) * plotH;
    html += `<line class="grid-line" x1="${padL}" x2="${W - padR}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}"/>`;
    const val = Math.round((i / nGrid) * maxCount);
    html += `<text class="axis-label" x="${padL - 6}" y="${(y + 3).toFixed(1)}" text-anchor="end">${fmtInt(val)}</text>`;
  }
  // baseline
  html += `<line class="axis-line" x1="${padL}" x2="${W - padR}" y1="${(padT + plotH).toFixed(1)}" y2="${(padT + plotH).toFixed(1)}"/>`;

  const n = counts.length;
  const barW = plotW / n;
  const gap = Math.min(1.5, barW * 0.08);
  counts.forEach((c, i) => {
    const h = (c / maxCount) * plotH;
    const x = padL + i * barW;
    const y = padT + plotH - h;
    html += `<rect class="bar" x="${(x + gap / 2).toFixed(2)}" y="${y.toFixed(2)}" width="${Math.max(0, barW - gap).toFixed(2)}" height="${h.toFixed(2)}" data-lo="${edges[i]}" data-hi="${edges[i + 1]}" data-count="${c}"></rect>`;
  });

  // x-axis ticks: 5 ticks across edges
  const nTicks = 5;
  for (let i = 0; i <= nTicks; i++) {
    const edgeIdx = Math.round((i / nTicks) * n);
    const edgeVal = edges[Math.min(edgeIdx, edges.length - 1)];
    const x = padL + Math.min(edgeIdx, n) * barW;
    html += `<text class="axis-label" x="${x.toFixed(1)}" y="${H - 4}" text-anchor="${i === 0 ? 'start' : (i === nTicks ? 'end' : 'middle')}">${fmtCompact(edgeVal)}</text>`;
  }

  svg.innerHTML = html;

  svg.querySelectorAll('.bar').forEach(rect => {
    rect.addEventListener('mousemove', (e) => {
      const lo = fmtCompact(parseFloat(rect.dataset.lo));
      const hi = fmtCompact(parseFloat(rect.dataset.hi));
      tooltip.textContent = `[${lo}, ${hi}]: ${fmtInt(rect.dataset.count)} solicitudes`;
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.classList.add('show');
    });
    rect.addEventListener('mouseleave', () => tooltip.classList.remove('show'));
  });
}

function fmtCompact(v) {
  if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(2) + 'M';
  if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'k';
  return Number.isInteger(v) ? String(v) : v.toFixed(1);
}

const numericGrid = document.getElementById('numeric-grid');
DATA.numeric.forEach(r => {
  const [label, unit] = LABELS[r.col] || [r.col, ''];
  const card = document.createElement('div');
  card.className = 'card';

  const pctInconsDecimals = (r.pct_incons > 0 && r.pct_incons < 0.1) ? 3 : 2;
  const inconsHtml = r.n_incons > 0
    ? `<div class="note-row crit"><b>Inconsistencias: ${fmt(r.pct_incons,pctInconsDecimals)}%</b> (${fmtInt(r.n_incons)} filas). Criterio: ${r.criterio_inconsistencia}</div>`
    : `<div class="note-row">Inconsistencias: 0%. Criterio evaluado: ${r.criterio_inconsistencia}</div>`;

  const dispHtml = r.dispersion_index !== null
    ? `<div class="stat"><div class="lbl">Var/Media</div><div class="val">${fmt(r.dispersion_index,2)}</div></div>`
    : `<div class="stat"><div class="lbl">Asimetría</div><div class="val">${fmt(r.skew,2)}</div></div>`;

  const extraHtml = (r.notas_extra || []).map(n => `<div class="note-row extra">${n}</div>`).join('');

  card.innerHTML = `
    <h3>${label}</h3>
    <p class="unit">${unit} · n válido = ${fmtInt(r.n_total - r.n_null)}</p>
    <div class="stat-grid">
      <div class="stat"><div class="lbl">% Nulos</div><div class="val ${r.pct_null>0?'warn':''}">${fmt(r.pct_null,2)}%</div></div>
      <div class="stat"><div class="lbl">% Ceros</div><div class="val">${fmt(r.pct_zeros,2)}%</div></div>
      <div class="stat"><div class="lbl">Media</div><div class="val">${fmt(r.mean,1)}</div></div>
      <div class="stat"><div class="lbl">Mediana</div><div class="val">${fmt(r.median,1)}</div></div>
      <div class="stat"><div class="lbl">Desv. Estándar</div><div class="val">${fmt(r.std,1)}</div></div>
      <div class="stat"><div class="lbl">p99</div><div class="val">${fmt(r.q99,1)}</div></div>
      <div class="stat"><div class="lbl">% &gt; p99</div><div class="val">${fmt(r.pct_above_q99,2)}%</div></div>
      ${dispHtml}
    </div>
    <div class="note-row">Rango sobre p99: [${fmtCompact(r.range_above_q99[0])}, ${fmtCompact(r.range_above_q99[1])}] · ${fmtInt(r.n_above_q99)} filas</div>
    ${inconsHtml}
    <div class="note-row dist">${r.interpretacion_dist}</div>
    ${extraHtml}
    <div class="chart-box"><svg class="hist"></svg></div>
  `;
  numericGrid.appendChild(card);
  renderHistogram(card.querySelector('svg.hist'), r.hist_counts, r.hist_edges);
});

const catGrid = document.getElementById('cat-grid');
DATA.categorical.forEach(r => {
  const label = CAT_LABELS[r.col] || r.col;
  const card = document.createElement('div');
  card.className = 'card';
  const maxCount = Math.max(...r.levels.filter(l => l.count).map(l => l.count));
  let rows = '';
  r.levels.forEach(l => {
    if (l.count === undefined || l.count === null || Number.isNaN(l.count)) return;
    const pct = (l.count / maxCount) * 100;
    rows += `<div class="catbar-row">
      <div class="catbar-label" title="${l.level}">${l.level}</div>
      <div class="catbar-track"><div class="catbar-fill" style="width:${pct.toFixed(1)}%"></div></div>
      <div class="catbar-val">${fmtInt(l.count)} (${fmt(l.pct,1)}%)</div>
    </div>`;
  });
  const unit = CAT_UNITS[r.col];
  const extraHtmlCat = (r.notas_extra || []).map(n => `<div class="note-row extra">${n}</div>`).join('');
  card.innerHTML = `
    <h3>${label}</h3>
    <p class="unit">${unit ? unit + ' · ' : ''}${r.n_levels} niveles · % nulos = ${fmt(r.pct_null,2)}%</p>
    ${rows}
    ${extraHtmlCat}
  `;
  catGrid.appendChild(card);
});

document.getElementById('footer-note').textContent =
  "Test de normalidad: D'Agostino-Pearson (scipy.stats.normaltest) y Kolmogorov-Smirnov contra normal ajustada. " +
  "Para variables con sesgo positivo se probó además ajuste a lognormal (KS). Para variables de conteo se reporta el índice de dispersión (varianza/media) contra la referencia Poisson (=1). " +
  "Con n=45.300 los tests de hipótesis tienen muchísima potencia: incluso desviaciones pequeñas de la normalidad son estadísticamente significativas (p≈0), por lo que la forma del histograma y el sesgo/curtosis son más informativos que el p-value solo.";
</script>
